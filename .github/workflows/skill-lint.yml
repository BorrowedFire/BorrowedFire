name: skill-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint skills
        run: bash tools/skill-lint.sh
      - name: Syntax-check shell scripts
        run: bash -n install.sh && bash -n tools/skill-lint.sh
      - name: shellcheck
        run: shellcheck install.sh tools/skill-lint.sh
