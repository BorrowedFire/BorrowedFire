name: skill-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint skills
        run: bash tools/skill-lint.sh
      - name: Syntax-check shell scripts
        run: bash -n install.sh && bash -n tools/skill-lint.sh
      - name: shellcheck
        run: shellcheck install.sh tools/skill-lint.sh tests/test-install.sh tests/test-brain.sh
      - name: Installer test matrix (sandbox HOME)
        run: bash tests/test-install.sh
      - name: Brain protocol live proof (two clones, bare remote)
        run: bash tests/test-brain.sh
